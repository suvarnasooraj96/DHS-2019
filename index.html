<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacology & Sciences Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div class="quiz-header">
                <span class="quiz-title">Medical & Pharmacy Quiz</span>
                <span class="stats" id="question-counter">Question 1/100</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>

            <div class="question-box">
                <p class="question-text" id="question-text">Loading question...</p>
                <div class="options-grid" id="options-container">
                    </div>
            </div>

            <div class="explanation-box" id="explanation-container">
                <h4>Explanation:</h4>
                <p id="explanation-text"></p>
            </div>

            <div class="footer-nav">
                <button class="action-btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>

        <div id="results-screen" class="results-card">
            <h2>Quiz Completed!</h2>
            <div class="score-display" id="final-score">0 / 0</div>
            <p class="feedback-text" id="final-feedback">Calculating your overall metric standard...</p>
            <button class="action-btn" style="display: inline-block; margin-top: 10px;" onclick="restartQuiz()">Restart Quiz</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
